[tools]
node = "24"

[tasks]
dev.run = "astro dev"
build = { run = "astro build", env = { NODE_ENV = "production" }}
lint.run = [
  "tsc --noEmit",
  "eslint"
]
fix.run = "eslint --fix"
clean.run = "git clean -dX --exclude=\"!.env\" --force"
refresh = { run = "rm --force ./pnpm-lock.yaml && corepack enable && corepack up && pnpm install", depends = [ "clean" ]}

[hooks]
postinstall = "corepack enable && pnpm install --frozen-lockfile"

[env]
_.file = ".env"
_.path = "./node_modules/.bin"

[settings]
# Required for hooks as of 2025.10
# https://mise.jdx.dev/hooks.html
experimental = true
